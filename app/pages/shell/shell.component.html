<div class="flex flex-column" style="min-height:100vh;">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-breadcrumb">
      <span class="breadcrumb-parent">Diagnostics</span>
      <span class="breadcrumb-sep">/</span>
      <span class="breadcrumb-current">Lab &amp; Radiology Services</span>
    </div>
    <div class="topbar-divider"></div>
    <div class="hospital-chip">
      <span class="dot"></span>
      City General Hospital · Hyderabad
    </div>
    <div class="topbar-spacer"></div>

    <div class="search-wrap">
      <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
      <input type="text" placeholder="Search patient, barcode, test…" aria-label="Search" />
    </div>

    <button class="topbar-icon-btn" title="Notifications">
      <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"/></svg>
      <span class="notif-dot"></span>
    </button>

    <button class="topbar-btn" (click)="openNewOrder()">
      <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
      New Order
    </button>
    <button class="topbar-btn primary" (click)="openPrintLabel()">
      <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 4v3H4a2 2 0 00-2 2v3a2 2 0 002 2h1v2a2 2 0 002 2h6a2 2 0 002-2v-2h1a2 2 0 002-2V9a2 2 0 00-2-2h-1V4a2 2 0 00-2-2H7a2 2 0 00-2 2zm8 0H7v3h6V4zm0 8H7v4h6v-4zm1-3a1 1 0 110 2 1 1 0 010-2z" clip-rule="evenodd"/></svg>
      Print Barcode
    </button>
  </header>

  <!-- TAB BAR -->
  <div class="tab-bar" role="tablist">
    <a *ngFor="let t of tabs"
       class="tab"
       [routerLink]="['/', t.id]"
       routerLinkActive="active"
       role="tab">
      <ng-container [ngSwitch]="t.svg">
        <svg *ngSwitchCase="'flask'" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7 2a1 1 0 00-.707 1.707L7 4.414v3.758a1 1 0 01-.293.707l-4 4C.817 14.769 2.156 18 4.828 18h10.343c2.673 0 4.012-3.231 2.122-5.121l-4-4A1 1 0 0113 8.172V4.414l.707-.707A1 1 0 0013 2H7z" clip-rule="evenodd"/></svg>
        <svg *ngSwitchCase="'radiology'" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm3 2h6v4H7V5zm8 8v2h1v-2h-1zm-2-2H7v4h6v-4zm2 0h1V9h-1v2zm1-4V5h-1v2h1zM5 5H4v2h1V5zM4 9h1v2H4V9zm1 4H4v2h1v-2z" clip-rule="evenodd"/></svg>
        <svg *ngSwitchCase="'doc'" viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5z" clip-rule="evenodd"/></svg>
        <svg *ngSwitchCase="'shield'" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001z" clip-rule="evenodd"/></svg>
        <svg *ngSwitchCase="'truck'" viewBox="0 0 20 20" fill="currentColor"><path d="M8 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM15 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z"/><path d="M3 4a1 1 0 00-1 1v10a1 1 0 001 1h1.05a2.5 2.5 0 014.9 0H10a1 1 0 001-1V5a1 1 0 00-1-1H3z"/></svg>
        <svg *ngSwitchCase="'chart'" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 000 2v8a2 2 0 002 2h2.586l-1.293 1.293a1 1 0 101.414 1.414L10 15.414l2.293 2.293a1 1 0 001.414-1.414L12.414 15H15a2 2 0 002-2V5a1 1 0 100-2H3z" clip-rule="evenodd"/></svg>
        <svg *ngSwitchCase="'ext'" viewBox="0 0 20 20" fill="currentColor"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></svg>
      </ng-container>
      {{ t.label }}
      <span *ngIf="t.pill"
            class="tab-pill"
            [class.alert]="t.alert"
            [style.background]="t.orange ? 'var(--orange-bg)' : null"
            [style.color]="t.orange ? 'var(--orange)' : null">{{ t.pill }}</span>
    </a>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <router-outlet></router-outlet>
  </div>
</div>
